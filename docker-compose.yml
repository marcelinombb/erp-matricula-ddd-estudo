# ERP Matrícula — Docker Compose
# Sobe PostgreSQL + dois módulos Spring Boot com um único comando.
#
# Módulos:
#   app-ddd     (porta 8080) — erp-matricula-ddd: arquitetura DDD (o "depois")
#   app-camadas (porta 8081) — erp-matricula-camadas: arquitetura em camadas (o "antes")
#
# Como executar:
#   docker compose up          — sobe em foreground (Ctrl+C para parar)
#   docker compose up -d       — sobe em background
#   docker compose down        — para e remove containers
#   docker compose down -v     — para, remove containers E volumes (reset do banco)
#
# Variáveis de ambiente opcionais:
#   DB_USER=outro docker compose up
#   DB_PASSWORD=outra docker compose up

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — banco de dados
  # postgres:16-alpine alinhado com o schema desenvolvido no projeto (V1__schema.sql)
  # init-db.sql cria o banco erp_matricula_camadas na inicialização
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: erp_matricula
      POSTGRES_USER: ${DB_USER:-matricula}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-matricula}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-matricula} -d erp_matricula"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  # ---------------------------------------------------------------------------
  # app-ddd — módulo DDD (o "depois")
  # Porta 8080: arquitetura DDD com domínio rico, UseCases, Value Objects
  # Banco: erp_matricula
  # ---------------------------------------------------------------------------
  app-ddd:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # SPRING_DATASOURCE_URL sobrescreve application.yml via convenção Spring Boot — sem perfis separados
      # "postgres" é o nome do service acima — Docker Compose resolve via DNS interno
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/erp_matricula
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-matricula}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-matricula}
    depends_on:
      postgres:
        # depends_on com condition: service_healthy garante que o banco está pronto antes de Flyway conectar
        # Sem isso: race condition — app inicia antes do PostgreSQL aceitar conexões
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # app-camadas — módulo arquitetura em camadas (o "antes")
  # Porta 8081: arquitetura tradicional Controller→Service→Repository com 6 anti-padrões
  # Banco: erp_matricula_camadas (separado para evitar conflito de Flyway migrations)
  # Ver: Pitfall 1 em .planning/phases/05-diagnostico-codigo-com-anti-padroes/05-RESEARCH.md
  # ---------------------------------------------------------------------------
  app-camadas:
    build:
      context: .
      dockerfile: Dockerfile.camadas
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/erp_matricula_camadas
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-matricula}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-matricula}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  # postgres_data persiste os dados entre restarts.
  # Para resetar o banco completamente: docker compose down -v
  postgres_data:
